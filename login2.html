<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMC Portal - Student Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #login-container {
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.11);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            padding: 30px 25px;
            text-align: center;
            color: white;
        }

        /* Glassmorphism Inputs */
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
            backdrop-filter: blur(5px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
        }

        .password-container {
            position: relative;
        }

        #togglePassword {
            position: absolute;
            right: 15px;
            top: 25px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            background: rgba(40, 167, 69, 0.6);
            color: white;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="login-container">
    <h2 style="margin-bottom: 20px; font-style: italic;">Student Login</h2>
    <input type="email" id="loginEmail" placeholder="Email Address" required>
    
    <div class="password-container">
        <input type="password" id="loginPassword" placeholder="Password" required style="padding-right: 45px;">
        <i class="fa-solid fa-eye" id="togglePassword"></i>
    </div>
    <div style="text-align: right; margin-top: 5px;">
        <a href="#" id="btnForgotPassword" style="color: #4caf50; font-size: 0.8rem; text-decoration: none; font-weight: 600;">Forgot Password?</a>
    </div>
    
    <button id="btnLogin" class="btn">Login</button>
    <p style="margin-top: 15px; font-size: 0.8rem;">Don't have an account? <a href="signup2.html" style="color: #4caf50; text-decoration: none;">Sign up here</a></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCC0CEWZA2vyzIJK5xpZrEGxeikp7cchvA",
        authDomain: "hmc-web-7c65f.firebaseapp.com",
        projectId: "hmc-web-7c65f",
        storageBucket: "hmc-web-7c65f.firebasestorage.app",
        messagingSenderId: "360307989861",
        appId: "1:360307989861:web:970da58dff8e4ea669d58c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Password Eye Button Logic
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('loginPassword');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // Enter Key Login Logic
    document.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            const loginBtn = document.getElementById('btnLogin');
            if (loginBtn && !loginBtn.disabled) {
                loginBtn.click();
            }
        }
    });

    // Forgot Password Logic
    document.getElementById('btnForgotPassword').addEventListener('click', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) {
            const userEmail = prompt("Please enter your email address to reset your password:");
            if (userEmail && userEmail.trim()) {
                resetPassword(userEmail.trim());
            }
        } else {
            if (confirm(`Send password reset link to ${email}?`)) {
                resetPassword(email);
            }
        }
    });

    function resetPassword(email) {
        sendPasswordResetEmail(auth, email)
            .then(() => {
                alert("Password reset email sent! Please check your inbox (and spam folder).");
            })
            .catch((error) => {
                alert("Error sending password reset email: " + error.message);
            });
    }

    let redirecting = false;
    const ADMIN_EMAIL = "enishad7788@gmail.com";

    // Listen to Auth State to handle Auto-Login and Safe Redirects after authentication persistence
    onAuthStateChanged(auth, (user) => {
        if (user && !redirecting) {
            redirecting = true;
            
            const loginBtn = document.getElementById('btnLogin');
            if (loginBtn) {
                loginBtn.disabled = true;
                loginBtn.innerText = "Redirecting...";
            }

            // Verify if user is an admin or student, and route accordingly
            getDoc(doc(db, "users", user.uid)).then((docSnap) => {
                let isAdmin = (user.email === ADMIN_EMAIL);
                let isApproved = false;
                let isRejected = false;
                let userData = null;

                if (docSnap.exists()) {
                    userData = docSnap.data();
                    if (userData.role === 'admin' || userData.isAdmin === true) {
                        isAdmin = true;
                    }
                    isApproved = (userData.approved === true);
                    isRejected = (userData.approved === "rejected");
                }

                if (isAdmin) {
                    localStorage.setItem('hmc_user_name', userData ? userData.name : 'Admin');
                    localStorage.setItem('hmc_user_email', user.email);
                    localStorage.setItem('hmc_user_authenticated', 'true');
                    window.location.href = "admin.html";
                } else if (isRejected) {
                    alert("Your account registration has been rejected by the admin.");
                    auth.signOut().then(() => {
                        redirecting = false;
                        if (loginBtn) {
                            loginBtn.disabled = false;
                            loginBtn.innerText = "Login";
                        }
                    });
                } else if (isApproved) {
                    localStorage.setItem('hmc_user_name', userData.name);
                    localStorage.setItem('hmc_user_email', userData.email);
                    localStorage.setItem('hmc_user_authenticated', 'true');
                    window.location.href = "index.html?login=success";
                } else {
                    // Pending approval
                    alert("Your account is pending Admin Approval.");
                    localStorage.setItem('hmc_user_name', userData ? userData.name : 'Student');
                    localStorage.setItem('hmc_user_email', user.email);
                    localStorage.setItem('hmc_user_authenticated', 'true');
                    window.location.href = "index.html?login=success";
                }
            }).catch((err) => {
                console.error("Error loading user state:", err);
                // Fallback email check if database read fails
                if (user.email === ADMIN_EMAIL) {
                    localStorage.setItem('hmc_user_name', 'Admin');
                    localStorage.setItem('hmc_user_email', user.email);
                    localStorage.setItem('hmc_user_authenticated', 'true');
                    window.location.href = "admin.html";
                } else {
                    localStorage.setItem('hmc_user_authenticated', 'true');
                    window.location.href = "index.html?login=success";
                }
            });
        }
    });

    // Firebase Login Button Logic
    document.getElementById('btnLogin').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (email === "" || password === "") {
            alert("Please fill all fields!");
            return;
        }

        const loginBtn = document.getElementById('btnLogin');
        loginBtn.disabled = true;
        loginBtn.innerText = "Logging in...";

        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // Successful sign-in will automatically trigger the onAuthStateChanged listener
            })
            .catch((error) => {
                alert("Login failed: " + error.message);
                loginBtn.disabled = false;
                loginBtn.innerText = "Login";
            });
    });
</script>

</body>
</html>
