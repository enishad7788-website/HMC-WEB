<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMC Portal - Student Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .navbar { background-color: #333; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { margin: 0; font-size: 20px; }
        .btn-logout { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-logout:hover { background-color: #c82333; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #007bff; }
        .welcome-box { margin-top: 20px; padding: 20px; background-color: #e9ecef; border-radius: 6px; font-size: 18px; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>HMC Portal - Student Dashboard</h1>
    <button id="btnLogout" class="btn-logout">Logout</button>
</div>

<div class="container">
    <h2>Welcome to HMC Student Portal</h2>
    <p>You have successfully logged into your account.</p>
    
    <div class="welcome-box">
        Hello, <strong id="userName">Student</strong>!<br>
        <span style="font-size: 14px; color: #666;" id="userEmail">Loading email...</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCC0CEWZA2vyzIJK5xpZrEGxeikp7cchvA",
        authDomain: "hmc-web-7c65f.firebaseapp.com",
        projectId: "hmc-web-7c65f",
        storageBucket: "hmc-web-7c65f.firebasestorage.app",
        messagingSenderId: "360307989861",
        appId: "1:360307989861:web:970da58dff8e4ea669d58c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Check if user is logged in and fetch details
    onAuthStateChanged(auth, (user) => {
        if (user) {
            getDoc(doc(db, "users", user.uid)).then((docSnap) => {
                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    document.getElementById('userName').innerText = userData.name;
                    document.getElementById('userEmail').innerText = userData.email;
                } else {
                    document.getElementById('userEmail').innerText = user.email;
                }
            });
        } else {
            // If not logged in, redirect to login page
            window.location.href = "login2.html";
        }
    });

    // Logout Function
    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => {
            alert("Logged out successfully!");
            window.location.href = "login2.html";
        });
    });
</script>

</body>
</html>
