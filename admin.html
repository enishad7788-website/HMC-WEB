<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMC Portal - Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .btn-approve { background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-approve:hover { background-color: #218838; }
        .btn-reject { background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 8px; }
        .btn-reject:hover { background-color: #c82333; }
        .status-pending { color: #dc3545; font-weight: bold; }
        .status-approved { color: #28a745; font-weight: bold; }
        .status-rejected { color: #bd2130; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>HMC Admin Panel - Student Approvals</h2>
    <p>Manage new student registrations and grant access to the dashboard.</p>
    
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTable">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCC0CEWZA2vyzIJK5xpZrEGxeikp7cchvA",
        authDomain: "hmc-web-7c65f.firebaseapp.com",
        projectId: "hmc-web-7c65f",
        storageBucket: "hmc-web-7c65f.firebasestorage.app",
        messagingSenderId: "360307989861",
        appId: "1:360307989861:web:970da58dff8e4ea669d58c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fetch all users from Firestore
    onSnapshot(collection(db, "users"), (snapshot) => {
        const tableBody = document.getElementById('studentTable');
        tableBody.innerHTML = ""; // Clear old data

        snapshot.forEach((userDoc) => {
            const student = userDoc.data();
            const row = document.createElement('tr');

            let statusText = 'Pending Approval';
            let statusClass = 'status-pending';
            let actionButtons = '';

            if (student.approved === true) {
                statusText = 'Approved';
                statusClass = 'status-approved';
                actionButtons = `<button class="btn-reject" onclick="rejectStudent('${userDoc.id}')">Reject</button>`;
            } else if (student.approved === 'rejected') {
                statusText = 'Rejected';
                statusClass = 'status-rejected';
                actionButtons = '';
            } else {
                statusText = 'Pending Approval';
                statusClass = 'status-pending';
                actionButtons = `
                    <button class="btn-approve" onclick="approveStudent('${userDoc.id}')">Approve</button>
                    <button class="btn-reject" onclick="rejectStudent('${userDoc.id}')">Reject</button>
                `;
            }

            row.innerHTML = `
                <td>${student.name}</td>
                <td>${student.email}</td>
                <td class="${statusClass}">${statusText}</td>
                <td>${actionButtons}</td>
            `;
            tableBody.appendChild(row);
        });
    });

    // Approve Student Function
    window.approveStudent = function(uid) {
        const userRef = doc(db, "users", uid);
        updateDoc(userRef, {
            approved: true
        }).then(() => {
            alert("Student account approved successfully!");
        }).catch((error) => {
            alert("Error: " + error.message);
        });
    }

    // Reject Student Function
    window.rejectStudent = function(uid) {
        if (confirm("Are you sure you want to reject this student?")) {
            const userRef = doc(db, "users", uid);
            updateDoc(userRef, {
                approved: "rejected"
            }).then(() => {
                alert("Student account rejected successfully!");
            }).catch((error) => {
                alert("Error: " + error.message);
            });
        }
    }
</script>

</body>
</html>
